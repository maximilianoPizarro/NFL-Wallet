{{- if (index .Values "rhbk-neuroface" "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nfl-wallet.partOf" . }}-realm
  labels:
    app: rhbk-neuroface
    app.kubernetes.io/part-of: {{ include "nfl-wallet.partOf" . }}
data:
  nfl-wallet-realm.json: |
    {
      "realm": {{ (index .Values "rhbk-neuroface" "realm" "name") | default "neuroface" | quote }},
      "displayName": {{ (index .Values "rhbk-neuroface" "realm" "displayName") | default "NeuroFace Biometric" | quote }},
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "verifyEmail": false,
      "roles": {
        "realm": [
          { "name": "biometric-user", "description": "User with biometric enrollment" },
          { "name": "biometric-admin", "description": "Admin for biometric management" },
          { "name": "wallet-user", "description": "User authorized to operate wallets" }
        ]
      },
      "groups": [
        { "name": "biometric-enrolled", "realmRoles": ["biometric-user", "wallet-user"] }
      ],
      "clients": [
        {
          "clientId": "neuroface-app",
          "name": "NeuroFace App",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        },
        {
          "clientId": "neuroface-backend",
          "name": "NeuroFace Backend",
          "enabled": true,
          "bearerOnly": true,
          "publicClient": false
        },
        {
          "clientId": "nfl-wallet-app",
          "name": "Stadium Wallet",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "defaultClientScopes": ["openid", "profile", "email"]
        }
      ],
      "users": [
        {
          "username": "john.doe",
          "email": "john.doe@example.com",
          "firstName": "John",
          "lastName": "Doe",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["20123456"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "changeme", "temporary": true }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "wallet-user"],
          "groups": ["biometric-enrolled"]
        },
        {
          "username": "jane.smith",
          "email": "jane.smith@example.com",
          "firstName": "Jane",
          "lastName": "Smith",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["20876543"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "changeme", "temporary": true }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "wallet-user"],
          "groups": ["biometric-enrolled"]
        },
        {
          "username": "robert.johnson",
          "email": "robert.johnson@example.com",
          "firstName": "Robert",
          "lastName": "Johnson",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["30111222"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "changeme", "temporary": true }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "wallet-user"],
          "groups": ["biometric-enrolled"]
        },
        {
          "username": "maria.garcia",
          "email": "maria.garcia@example.com",
          "firstName": "Maria",
          "lastName": "Garcia",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["30333444"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "changeme", "temporary": true }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "wallet-user"],
          "groups": ["biometric-enrolled"]
        },
        {
          "username": "james.wilson",
          "email": "james.wilson@example.com",
          "firstName": "James",
          "lastName": "Wilson",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["40555666"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "changeme", "temporary": true }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "wallet-user"],
          "groups": ["biometric-enrolled"]
        },
        {
          "username": "emily.brown",
          "email": "emily.brown@example.com",
          "firstName": "Emily",
          "lastName": "Brown",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["40777888"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "changeme", "temporary": true }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "wallet-user"],
          "groups": ["biometric-enrolled"]
        },
        {
          "username": "maxpizarro",
          "email": "mpizarro@redhat.com",
          "firstName": "Max",
          "lastName": "Pizarro",
          "enabled": true,
          "emailVerified": true,
          "attributes": {
            "documentNumber": ["50999001"],
            "biometric_enrolled": ["false"]
          },
          "credentials": [{ "type": "password", "value": "neuroface", "temporary": false }],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["biometric-user", "biometric-admin", "wallet-user"],
          "groups": ["biometric-enrolled"]
        }
      ],
      "requiredActions": [
        {
          "alias": "biometric-enrollment",
          "name": "NeuroFace Biometric Enrollment",
          "providerId": "biometric-enrollment",
          "enabled": true,
          "defaultAction": false,
          "priority": 100
        }
      ],
      "authenticationFlows": [
        {
          "alias": "biometric browser",
          "description": "Browser login with biometric second factor via NeuroFace",
          "providerId": "basic-flow",
          "topLevel": true,
          "builtIn": false,
          "authenticationExecutions": [
            {
              "authenticator": "auth-cookie",
              "authenticatorFlow": false,
              "requirement": "ALTERNATIVE",
              "priority": 10,
              "userSetupAllowed": false,
              "autheticatorFlow": false
            },
            {
              "authenticatorFlow": true,
              "requirement": "ALTERNATIVE",
              "priority": 20,
              "flowAlias": "biometric browser forms",
              "userSetupAllowed": false,
              "autheticatorFlow": true
            }
          ]
        },
        {
          "alias": "biometric browser forms",
          "description": "Username/password + biometric 2FA",
          "providerId": "basic-flow",
          "topLevel": false,
          "builtIn": false,
          "authenticationExecutions": [
            {
              "authenticator": "auth-username-password-form",
              "authenticatorFlow": false,
              "requirement": "REQUIRED",
              "priority": 10,
              "userSetupAllowed": false,
              "autheticatorFlow": false
            },
            {
              "authenticator": "biometric-authenticator",
              "authenticatorFlow": false,
              "requirement": "REQUIRED",
              "priority": 20,
              "userSetupAllowed": false,
              "autheticatorFlow": false
            }
          ]
        },
        {
          "alias": "biometric registration",
          "description": "Delegated registration flow with biometric enrollment",
          "providerId": "basic-flow",
          "topLevel": true,
          "builtIn": false,
          "authenticationExecutions": [
            {
              "authenticatorFlow": true,
              "requirement": "REQUIRED",
              "priority": 10,
              "flowAlias": "biometric registration form",
              "userSetupAllowed": false,
              "autheticatorFlow": true
            }
          ]
        },
        {
          "alias": "biometric registration form",
          "description": "Registration form with biometric capture",
          "providerId": "form-flow",
          "topLevel": false,
          "builtIn": false,
          "authenticationExecutions": [
            {
              "authenticator": "registration-user-creation",
              "authenticatorFlow": false,
              "requirement": "REQUIRED",
              "priority": 10,
              "userSetupAllowed": false,
              "autheticatorFlow": false
            },
            {
              "authenticator": "registration-password-action",
              "authenticatorFlow": false,
              "requirement": "REQUIRED",
              "priority": 20,
              "userSetupAllowed": false,
              "autheticatorFlow": false
            },
            {
              "authenticator": "registration-profile-action",
              "authenticatorFlow": false,
              "requirement": "REQUIRED",
              "priority": 30,
              "userSetupAllowed": false,
              "autheticatorFlow": false
            }
          ]
        }
      ],
      "browserFlow": "biometric browser",
      "registrationFlow": "biometric registration",
      "clientAuthenticationFlow": "clients",
      "eventsEnabled": true,
      "eventsExpiration": 604800,
      "eventsListeners": ["jboss-logging"],
      "adminEventsEnabled": true,
      "adminEventsDetailsEnabled": true,
      "attributes": {
        "neuroface.api.url": "http://neuroface-backend:8080/api",
        "neuroface.confidence.threshold": "{{ (index .Values "rhbk-neuroface" "biometric" "confidenceThreshold") | default 65.0 }}",
        "neuroface.max.enrollment.images": "{{ (index .Values "rhbk-neuroface" "biometric" "maxEnrollmentImages") | default 5 }}",
        "neuroface.camera.width": "{{ (index .Values "rhbk-neuroface" "biometric" "cameraWidth") | default 640 }}",
        "neuroface.camera.height": "{{ (index .Values "rhbk-neuroface" "biometric" "cameraHeight") | default 480 }}"
      }
    }
{{- end }}
