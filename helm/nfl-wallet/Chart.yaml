apiVersion: v2
name: nfl-wallet
description: Stadium Wallet - Vue frontend, three .NET 8 APIs, ESPN scoreboard integration, and RHBK biometric authentication
type: application
version: 0.1.3
appVersion: "1.0.1"
icon: https://maximilianopizarro.github.io/NFL-Wallet/sw.svg
keywords:
  - nfl
  - wallet
  - vue
  - dotnet
  - gateway-api
  - kuadrant
  - istio
  - espn
  - rhbk
  - keycloak
  - biometric
maintainers:
  - name: Maximiliano Pizarro
    email: mapizarr@redhat.com
dependencies:
  - name: rhbk-neuroface
    version: "1.0.1"
    repository: https://maximilianopizarro.github.io/rhbk-biometric-flow/
    condition: rhbk-neuroface.enabled
annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://maximilianopizarro.github.io/NFL-Wallet/
    - name: Source
      url: https://github.com/maximilianopizarro/NFL-Wallet
  artifacthub.io/changes: |
    - kind: added
      description: "ESPN NFL Scoreboard integration with carousel banner (public API by default)"
    - kind: added
      description: "RHBK (Red Hat Build of Keycloak) with NeuroFace biometric authentication as optional dependency"
    - kind: added
      description: "Pre-configured realm with verified accounts matching mock customer data"
    - kind: added
      description: "Wallet authentication flow with OIDC login and private wallets per user"
  artifacthub.io/images: |
    - name: webapp
      image: quay.io/maximilianopizarro/nfl-wallet-webapp:latest
    - name: api-customers
      image: quay.io/maximilianopizarro/nfl-wallet-api-customers:latest
    - name: api-bills
      image: quay.io/maximilianopizarro/nfl-api-bills:latest
    - name: api-raiders
      image: quay.io/maximilianopizarro/nfl-wallet-api-raiders:latest
