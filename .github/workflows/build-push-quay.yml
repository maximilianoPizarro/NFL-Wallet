# Build NFL-Wallet images and push to quay.io
# Triggers:
#   - Push to main/master  → tags: latest, sha-<7chars>
#   - Git tag v* (v1.0.1)  → tags: latest, 1.0.1, sha-<7chars>
#   - Manual workflow_dispatch
# Requires GitHub secrets:
#   QUAY_USERNAME, QUAY_PASSWORD
#   REDHAT_REGISTRY_USERNAME, REDHAT_REGISTRY_PASSWORD

name: Build and push to Quay.io

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  QUAY_REGISTRY: quay.io
  QUAY_NAMESPACE: ${{ vars.QUAY_NAMESPACE || 'maximilianopizarro' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: nfl-wallet-api-customers
            context: ./ApiCustomers
            file: ./ApiCustomers/Containerfile
          - image: nfl-api-bills
            context: ./ApiWalletBuffaloBills
            file: ./ApiWalletBuffaloBills/Containerfile
          - image: nfl-wallet-api-raiders
            context: ./ApiWalletLasVegasRaiders
            file: ./ApiWalletLasVegasRaiders/Containerfile
          - image: nfl-wallet-webapp
            context: ./frontend
            file: ./frontend/Containerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Log in to Red Hat registry (registry.access.redhat.com)
        uses: docker/login-action@v3
        with:
          registry: registry.access.redhat.com
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Log in to Red Hat registry (registry.redhat.io)
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
